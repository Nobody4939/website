<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Manager</title>
    <style>
        body { background: #0a0a0a; color: #d1d1d1; font-family: 'Segoe UI', sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .card { background: #161616; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #2a2a2a; }
        h2 { color: #fff; margin-top: 0; }
        h3 { color: #888; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .row { display: flex; gap: 8px; margin-bottom: 8px; }
        input { background: #222; color: #fff; border: 1px solid #333; padding: 10px; border-radius: 6px; flex: 1; }
        button { background: #333; color: #fff; border: none; padding: 10px 15px; cursor: pointer; border-radius: 6px; transition: 0.2s; }
        button:hover { background: #444; }
        button.del { background: #552222; }
        #drag-me { display: block; padding: 25px; background: linear-gradient(135deg, #007bff, #0056b3); color: white; text-align: center; text-decoration: none; border-radius: 12px; font-weight: bold; cursor: move; border: 2px solid #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <h2>Portal Manager</h2>
    <div class="card">
        <h3>Main Tabs</h3>
        <div id="m-list"></div>
        <button onclick="add('m')">+ Add Tab</button>
    </div>
    <div class="card">
        <h3>Itch.io List</h3>
        <div id="a-list"></div>
        <button onclick="add('a')">+ Add Game</button>
    </div>
    <a id="drag-me" draggable="true">DRAG ME TO BOOKMARKS</a>

    <script>
        const footerButtons = [
            { label: 'Kemono', url: 'https://kemono.cr/account/favorites/artists' },
            { label: 'PH', url: 'https://www.pornhub.com' },
            { label: 'Coomer', url: 'https://coomer.st/account/favorites/artists' },
            { label: 'Rule34', url: 'https://rule34.xxx/index.php?page=post&s=list&tags=yuri' }
        ];

        let d = JSON.parse(localStorage.getItem('p_data')) || { m: [], a: [] };
        function save() { localStorage.setItem('p_data', JSON.stringify(d)); updateLink(); }
        function add(t) { d[t].push({l:'New', u:'https://'}); save(); render(); }
        function del(t, i) { d[t].splice(i, 1); save(); render(); }
        
        function render() {
            ['m','a'].forEach(t => {
                const c = document.getElementById(t + '-list');
                c.innerHTML = '';
                d[t].forEach((it, i) => {
                    const row = document.createElement('div'); row.className = 'row';
                    row.innerHTML = `<input value="${it.l}" onchange="d['${t}'][${i}].l=this.value; save()"> <input value="${it.u}" onchange="d['${t}'][${i}].u=this.value; save()"> <button class="del" onclick="del('${t}',${i})">✕</button>`;
                    c.appendChild(row);
                });
            });
        }

        function updateLink() {
            const js = `(function(){if(document.getElementById('cg-popup-overlay'))return;const mainButtons=${JSON.stringify(d.m)},altButtons=${JSON.stringify(d.a)},footerButtons=${JSON.stringify(footerButtons)};const s=document.createElement('style');s.id='cg-popup-styles';s.textContent=\`.cg-popup-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);z-index:2147483647;}.cg-popup{background:#111;border-radius:12px;width:300px;max-width:90vw;max-height:70vh;overflow:hidden;display:flex;flex-direction:column;border:1px solid #333;}.cg-header{padding:12px;background:#1a1a1a;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #333;}.cg-list{flex:1;padding:10px;overflow-y:auto;}.cg-main-btn{width:100%;padding:10px;margin:5px 0;border:0;border-radius:6px;background:#222;color:#fff;text-align:left;}.cg-footer{padding:10px;background:#1a1a1a;display:flex;justify-content:center;gap:10px;}.cg-footer-btn{width:35px;height:35px;border:0;border-radius:8px;background:#333;color:white;}\`;document.head.appendChild(s);const o=document.createElement('div');o.id='cg-popup-overlay';o.className='cg-popup-overlay';const p=document.createElement('div');p.className='cg-popup';const h=document.createElement('div');h.className='cg-header';const t=document.createElement('h3');t.style.margin='0';t.textContent='Secret Tabs';const x=document.createElement('button');x.textContent='✕';x.style.background='none';x.style.border='0';x.style.color='#fff';x.onclick=()=>o.remove();h.append(t,x);const l=document.createElement('div');l.className='cg-list';function ren(items,title){l.innerHTML='';t.textContent=title;items.forEach(i=>{const b=document.createElement('button');b.className='cg-main-btn';b.innerText=i.l;b.onclick=()=>location.href=i.u;l.appendChild(b);});}ren(mainButtons,'Secret Tabs');const f=document.createElement('div');f.className='cg-footer';const sw=document.createElement('button');sw.className='cg-footer-btn';sw.textContent='⇆';let cur='m';sw.onclick=()=>{cur=cur=='m'?'a':'m';ren(cur=='m'?mainButtons:altButtons,cur=='m'?'Secret Tabs':'Itch IO');};f.appendChild(sw);footerButtons.forEach(i=>{const fb=document.createElement('button');fb.className='cg-footer-btn';fb.innerText=i.l.charAt(0);fb.onclick=()=>location.href=i.u;f.appendChild(fb);});p.append(h,l,f);o.appendChild(p);document.body.appendChild(o);o.onclick=(e)=>{if(e.target===o)o.remove();};})()`;
            document.getElementById('drag-me').href = 'javascript:' + js;
        }
        render();
        updateLink();
    </script>
</body>
</html>
