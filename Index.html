<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Dashboard</title>
    <style>
        body { background: #0e0e0e; color: #eee; font-family: sans-serif; padding: 20px; }
        .box { background: #151515; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        input { background: #222; color: #fff; border: 1px solid #444; padding: 8px; width: 45%; margin: 2px; }
        #bookmarklet { display: inline-block; padding: 20px; background: #007bff; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; cursor: grab; }
    </style>
</head>
<body>
    <h2>Portal Editor</h2>
    <div class="box"><h3>Main List</h3><div id="main-list"></div><button onclick="add('main')">+ Add</button></div>
    <div class="box"><h3>Itch.io List</h3><div id="itch-list"></div><button onclick="add('itch')">+ Add</button></div>
    <div class="box"><h3>Footer Links</h3><div id="foot-list"></div><button onclick="add('foot')">+ Add</button></div>
    
    <a id="bookmarklet">DRAG ME TO BOOKMARKS</a>

    <script>
        let data = JSON.parse(localStorage.getItem('portal_data')) || {main:[], itch:[], foot:[]};
        function save() { localStorage.setItem('portal_data', JSON.stringify(data)); render(); }
        function add(t) { data[t].push({l:'New', u:'https://'}); save(); }
        function del(t, i) { data[t].splice(i, 1); save(); }
        
        function render() {
            ['main', 'itch', 'foot'].forEach(t => {
                const cont = document.getElementById(t + '-list');
                cont.innerHTML = '';
                data[t].forEach((item, i) => {
                    cont.innerHTML += `<div><input value="${item.l}" onchange="data['${t}'][${i}].l=this.value; save()"> 
                                       <input value="${item.u}" onchange="data['${t}'][${i}].u=this.value; save()">
                                       <button onclick="del('${t}',${i})">X</button></div>`;
                });
            });
            update();
        }

        function update() {
            const rawJs = `(function(){const d=${JSON.stringify(data)};if(document.getElementById('cg-p'))return;const s=document.createElement('style');s.textContent='.cg-p{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2147483647;display:flex;justify-content:center;align-items:center;}.cg-b{background:#0e0e0e;width:300px;border-radius:10px;color:#fff;padding:15px;font-family:sans-serif;}.cg-btn{display:block;width:100%;padding:10px;margin:5px 0;background:#222;border:0;color:#fff;border-radius:5px;}';document.head.appendChild(s);const o=document.createElement('div');o.id='cg-p';const c=document.createElement('div');c.className='cg-b';d.main.forEach(i=>{const b=document.createElement('button');b.className='cg-btn';b.innerText=i.l;b.onclick=()=>location.href=i.u;c.appendChild(b);});const x=document.createElement('button');x.className='cg-btn';x.innerText='Close';x.onclick=()=>o.remove();c.appendChild(x);o.appendChild(c);document.body.appendChild(o);})()`;
            const b64 = btoa(rawJs);
            document.getElementById('bookmarklet').href = 'javascript:eval(atob("' + b64 + '"))';
        }
        render();
    </script>
</body>
</html>
