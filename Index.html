<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Manager</title>
    <style>
        body { background: #0a0a0a; color: #d1d1d1; font-family: sans-serif; padding: 15px; max-width: 500px; margin: auto; }
        .card { background: #161616; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #222; }
        .row { display: flex; gap: 5px; margin-bottom: 5px; }
        input { background: #222; color: #fff; border: 1px solid #333; padding: 6px; border-radius: 4px; font-size: 12px; }
        input:nth-child(1) { width: 30%; } /* Label size reduced */
        input:nth-child(2) { flex: 1; }   /* URL size */
        button { background: #333; color: #fff; border: none; padding: 6px 10px; cursor: pointer; border-radius: 4px; font-size: 12px; }
        #drag-me { display: block; padding: 20px; background: #007bff; color: white; text-align: center; text-decoration: none; border-radius: 10px; font-weight: bold; border: 2px solid #fff; }
    </style>
</head>
<body>
    <h2>Portal Editor</h2>
    <div class="card"><h3>Tabs</h3><div id="m-list"></div><button onclick="add('m')">+ Add</button></div>
    <div class="card"><h3>Itch.io</h3><div id="a-list"></div><button onclick="add('a')">+ Add</button></div>
    <a id="drag-me" draggable="true">DRAG ME TO BOOKMARKS</a>

    <script>
        const footer = [{l:'Kemono',u:'https://kemono.cr/account/favorites/artists'},{l:'PH',u:'https://www.pornhub.com'},{l:'Coomer',u:'https://coomer.st/account/favorites/artists'},{l:'R34',u:'https://rule34.xxx/'}];
        let d = JSON.parse(localStorage.getItem('p_data')) || { m: [], a: [] };
        
        function save() { localStorage.setItem('p_data', JSON.stringify(d)); update(); }
        function add(t) { d[t].push({l:'New', u:'https://'}); save(); render(); }
        function del(t, i) { d[t].splice(i, 1); save(); render(); }
        
        function render() {
            ['m','a'].forEach(t => {
                const c = document.getElementById(t + '-list');
                c.innerHTML = '';
                d[t].forEach((it, i) => {
                    c.innerHTML += `<div class="row"><input value="${it.l}" onchange="d['${t}'][${i}].l=this.value; save()"> <input value="${it.u}" onchange="d['${t}'][${i}].u=this.value; save()"> <button onclick="del('${t}',${i})">X</button></div>`;
                });
            });
        }

        function update() {
            const css = ".cg-o{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999999;display:flex;align-items:center;justify-content:center;}.cg-p{background:#0e0e0e;width:300px;border-radius:10px;color:#fff;overflow:hidden;display:flex;flex-direction:column;}.cg-h{padding:10px;background:#151515;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #333;}.cg-l{flex:1;padding:10px;overflow-y:auto;}.cg-row{display:flex;align-items:center;gap:5px;margin-bottom:5px;}.cg-btn{flex:1;padding:8px;border:0;background:#222;color:#fff;text-align:left;border-radius:6px;}.cg-x{background:#444;border:0;color:#fff;padding:5px 8px;border-radius:4px;}.cg-f{padding:10px;background:#151515;display:flex;justify-content:center;gap:10px;}.cg-fb{width:35px;height:35px;border:0;background:#333;color:#fff;border-radius:8px;}";
            const js = `(function(){if(document.getElementById('cg-o'))return;const s=document.createElement('style');s.textContent='${css}';document.head.appendChild(s);const o=document.createElement('div');o.className='cg-o';o.id='cg-o';document.body.style.overflow='hidden';const p=document.createElement('div');p.className='cg-p';const h=document.createElement('div');h.className='cg-h';h.innerHTML='<b>Secret Tabs</b>';p.appendChild(h);const l=document.createElement('div');l.className='cg-l';const data={m:${JSON.stringify(d.m)},a:${JSON.stringify(d.a)},f:${JSON.stringify(footer)}};function ren(t){l.innerHTML='';data[t].forEach(i=>{const r=document.createElement('div');r.className='cg-row';const b=document.createElement('button');b.className='cg-btn';b.innerText=i.l;b.onclick=()=>location.href=i.u;const x=document.createElement('button');x.className='cg-x';x.innerText='X';x.onclick=()=>location.href=i.u;r.append(b,x);l.appendChild(r);});}ren('m');p.appendChild(l);const f=document.createElement('div');f.className='cg-f';const sw=document.createElement('button');sw.className='cg-fb';sw.innerText='⇆';sw.onclick=()=>{ren(l.dataset.cur=='a'?'m':'a');l.dataset.cur=l.dataset.cur=='a'?'m':'a';};f.appendChild(sw);data.f.forEach(i=>{const b=document.createElement('button');b.className='cg-fb';b.innerText=i.l.charAt(0);b.onclick=()=>location.href=i.u;f.appendChild(b);});p.appendChild(f);o.appendChild(p);document.body.appendChild(o);o.onclick=e=>{if(e.target==o){document.body.style.overflow='';o.remove();}};})()`;
            document.getElementById('drag-me').href = 'javascript:' + js;
        }
        render();
        update();
    </script>
</body>
</html>
