<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Manager</title>
    <style>
        body { background: #0e0e0e; color: #eee; font-family: sans-serif; padding: 20px; }
        .box { background: #151515; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #333; }
        input { background: #222; color: #fff; border: 1px solid #444; padding: 8px; width: 45%; margin-bottom: 5px; }
        button { background: #333; color: #fff; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; }
        #drag-me { 
            display: block; padding: 20px; margin-top: 20px;
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white; text-align: center; text-decoration: none; border-radius: 10px;
            font-weight: bold; cursor: move; border: 2px solid #fff;
        }
    </style>
</head>
<body>
    <h2>Portal Editor</h2>
    <div class="box"><h3>Tabs List</h3><div id="m-list"></div><button onclick="add('m')">+ Add</button></div>
    <div class="box"><h3>Itch.io List</h3><div id="a-list"></div><button onclick="add('a')">+ Add</button></div>
    
    <a id="drag-me" draggable="true">DRAG ME TO BOOKMARKS</a>

    <script>
        const footerButtons = [
            { label: 'Kemono', url: 'https://kemono.cr/account/favorites/artists' },
            { label: 'PH', url: 'https://www.pornhub.com' },
            { label: 'Coomer', url: 'https://coomer.st/account/favorites/artists' },
            { label: 'Rule34', url: 'https://rule34.xxx/index.php?page=post&s=list&tags=+%28+yuri+%7e+futa_on_female+%7e+solo_female+%7e+lesbian+%29+animated+-male+sound&pid=0' }
        ];

        let d = JSON.parse(localStorage.getItem('p_data')) || { m: [], a: [] };
        function save() { localStorage.setItem('p_data', JSON.stringify(d)); updateLink(); }
        function add(t) { d[t].push({l:'New', u:'https://'}); save(); render(); }
        function del(t, i) { d[t].splice(i, 1); save(); render(); }
        
        function render() {
            ['m','a'].forEach(t => {
                const c = document.getElementById(t + '-list');
                c.innerHTML = '';
                d[t].forEach((it, i) => {
                    c.innerHTML += `<div><input value="${it.l}" onchange="d['${t}'][${i}].l=this.value; save()"> <input value="${it.u}" onchange="d['${t}'][${i}].u=this.value; save()"> <button onclick="del('${t}',${i})">X</button></div>`;
                });
            });
        }

        function updateLink() {
            const js = `(function(){if(document.getElementById('cg-popup-overlay'))return;const mainButtons=${JSON.stringify(d.m)},altButtons=${JSON.stringify(d.a)},footerButtons=${JSON.stringify(footerButtons)};const s=document.createElement('style');s.id='cg-popup-styles';s.textContent=\`.cg-popup-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);z-index:2147483647;}.cg-popup{position:relative;background:#0e0e0e;border-radius:10px;width:300px;max-width:92vw;max-height:60vh;color:#EEE;box-shadow:0 6px 18px rgba(0,0,0,.7);overflow:hidden;font-family:Arial,sans-serif;display:flex;flex-direction:column;}.cg-header{position:relative;padding:10px 14px;background:#151515;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:flex-end;}.cg-title{position:absolute;left:50%;transform:translateX(-50%);margin:0;font-size:17px;color:#FFF;font-weight:500;text-align:center;pointer-events:none;}.cg-close-btn{background:none;border:none;color:#AAA;font-size:18px;cursor:pointer;}.cg-list{flex:1;padding:10px 12px;overflow-y:auto;}.cg-main-btn{width:100%;padding:9px;margin:5px 0;border:none;border-radius:6px;background:#222;color:#EEE;text-align:left;font-size:14px;cursor:pointer;}.cg-footer{position:relative;padding:8px 14px;background:#151515;border-top:1px solid #222;display:flex;justify-content:center;align-items:center;gap:10px;}.cg-footer-btn{width:36px;height:36px;border:none;border-radius:8px;background:#222;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:white;}\`;document.head.appendChild(s);const o=document.createElement('div');o.id='cg-popup-overlay';o.className='cg-popup-overlay';const p=document.createElement('div');p.className='cg-popup';const h=document.createElement('div');h.className='cg-header';const t=document.createElement('h2');t.className='cg-title';t.textContent='Secret Tabs';const cb=document.createElement('button');cb.className='cg-close-btn';cb.textContent='✕';cb.onclick=()=>o.remove();h.appendChild(t);h.appendChild(cb);const l=document.createElement('div');l.className='cg-list';function ren(items,title){l.innerHTML='';t.textContent=title;items.forEach(i=>{const b=document.createElement('button');b.className='cg-main-btn';b.innerText=i.label;b.onclick=()=>location.href=i.url;l.appendChild(b);});}ren(mainButtons,'Secret Tabs');const f=document.createElement('div');f.className='cg-footer';const sw=document.createElement('button');sw.className='cg-footer-btn';sw.style.position='absolute';sw.style.left='14px';sw.textContent='⇆';let cur='m';sw.onclick=()=>{cur=cur=='m'?'a':'m';ren(cur=='m'?mainButtons:altButtons,cur=='m'?'Secret Tabs':'Itch IO');};f.appendChild(sw);footerButtons.forEach(i=>{const fb=document.createElement('button');fb.className='cg-footer-btn';fb.innerText=i.label.charAt(0);fb.onclick=()=>location.href=i.url;f.appendChild(fb);});p.appendChild(h);p.appendChild(l);p.appendChild(f);o.appendChild(p);document.body.appendChild(o);})()`;
            document.getElementById('drag-me').href = 'javascript:' + js;
        }
        render();
        updateLink();
    </script>
</body>
</html>
