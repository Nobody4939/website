<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Tabs UI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b0b0b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Modal Overlay Container */
        .modal-overlay {
            width: 360px;
            background-color: #151515;
            border: 1px solid #222222;
            border-radius: 14px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Layout */
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            border-bottom: 1px solid #222222;
        }

        .header-spacer {
            width: 20px;
        }

        .modal-title {
            color: #ffffff;
            font-size: 17px;
            font-weight: 600;
            text-align: center;
            flex-grow: 1;
        }

        .close-btn {
            color: #8e8e93;
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
            user-select: none;
        }

        .close-btn:hover {
            color: #ffffff;
        }

        /* Scrollable Tab List */
        .tab-list {
            padding: 16px;
            max-height: 420px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Custom Dark Scrollbar styling */
        .tab-list::-webkit-scrollbar {
            width: 4px;
        }
        .tab-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .tab-list::-webkit-scrollbar-thumb {
            background: #333333;
            border-radius: 10px;
        }

        /* Individual Tab Row Links */
        .tab-item {
            background-color: #212121;
            border: 1px solid #2d2d2d;
            border-radius: 10px;
            padding: 14px 18px;
            color: #e5e5ea;
            font-size: 15px;
            text-decoration: none;
            display: block;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .tab-item:hover {
            background-color: #2a2a2a;
            border-color: #3a3a3a;
        }

        /* Bottom Control Navbar Bar */
        .modal-footer {
            background-color: #111111;
            padding: 12px 16px;
            border-top: 1px solid #222222;
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .footer-btn {
            background-color: #1e1e1e;
            border: 1px solid #2d2d2d;
            color: #ffffff;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }

        .footer-btn:hover {
            background-color: #282828;
        }
    </style>
</head>
<body>

    <div class="modal-overlay">
        <!-- Top Title Bar -->
        <div class="modal-header">
            <div class="header-spacer"></div>
            <div class="modal-title">Secret Tabs</div>
            <div class="close-btn" onclick="alert('Close clicked')">✕</div>
        </div>

        <!-- Links Container -->
        <div class="tab-list">
            <a href="https://example.com" target="_blank" class="tab-item">Js_UI</a>
            <a href="https://example.com" target="_blank" class="tab-item">Pornhub</a>
            <a href="https://example.com" target="_blank" class="tab-item">SimpCity</a>
            <a href="https://example.com" target="_blank" class="tab-item">CreamySpot</a>
            <a href="https://example.com" target="_blank" class="tab-item">YourShyCrush</a>
            <a href="https://example.com" target="_blank" class="tab-item">LiiMewls</a>
            <a href="https://example.com" target="_blank" class="tab-item">ThePerfectStorm14</a>
            <a href="https://example.com" target="_blank" class="tab-item">WowMarie</a>
            <a href="https://example.com" target="_blank" class="tab-item">MeeHutao</a>
        </div>

        <!-- Bottom Action Bar -->
        <div class="modal-footer">
            <div class="footer-btn" onclick="alert('Switch triggered')">⇆</div>
            <div class="footer-btn" onclick="alert('K triggered')">K</div>
            <div class="footer-btn" onclick="alert('P triggered')">P</div>
            <div class="footer-btn" onclick="alert('C triggered')">C</div>
            <div class="footer-btn" onclick="alert('R triggered')">R</div>
        </div>
    </div>

</body>
</html>
