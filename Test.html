<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Iframe Test</title>

<style>
html,body{
    margin:0;
    padding:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial,sans-serif;
}

.wrapper{
    padding:20px;
}

.card{
    background:#151515;
    border:1px solid #222;
    border-radius:12px;
    padding:20px;
}

h1{
    margin-bottom:15px;
}

.item{
    background:#212121;
    border:1px solid #2d2d2d;
    border-radius:8px;
    padding:12px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="wrapper">
    <div class="card">
        <h1>Secret Tabs Test</h1>

        <div class="item">Js_UI</div>
        <div class="item">SimpCity</div>
        <div class="item">CreamySpot</div>

        <p>If you can see this inside the popup, the iframe is working.</p>
    </div>
</div>

<script>
document.body.insertAdjacentHTML(
    "beforeend",
    "<p style='color:lime;padding:20px'>JavaScript Running</p>"
);
</script>

</body>
</html>
